<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣家族 (非官方網誌) - 首頁</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang HK", "Microsoft JhengHei", sans-serif;
            background-color: #f9f9f9;
            color: #222;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        #container {
            max-width: 750px;
            margin: 40px auto;
            background: #fff;
            padding: 40px 50px;
            border: 1px solid #ddd;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .site-icon {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border: 1px solid #ccc;
            padding: 2px;
            background: #fff;
        }

        .site-title {
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
            color: #222;
        }

        .disclaimer {
            font-size: 13px;
            color: #888;
            margin-bottom: 30px;
            padding: 10px;
            background-color: #f1f1f1;
            border-left: 4px solid #666;
        }

        h1 {
            font-size: 22px;
            color: #111;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        /* Generated Blog Post Layouts */
        .blog-post-card {
            border: 1px solid #eee;
            background: #fafafa;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .blog-post-card h2 {
            font-size: 20px;
            color: #111;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .blog-post-card p {
            font-size: 15px;
            margin: 8px 0;
            white-space: pre-wrap; /* Preserves text line breaks */
        }

        .blog-post-card a {
            color: #0056b3;
            text-decoration: underline;
        }

        .blog-post-card a:hover {
            color: #003d82;
        }

        .error-msg {
            color: #c0392b;
            font-size: 14px;
            background: #fdf2e9;
            padding: 10px;
            border: 1px solid #f5c6cb;
        }

        .footer {
            margin-top: 60px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="container">
        
        <!-- Top Branding Header -->
        <div class="brand-header">
            <img src="icons/weatherfamily.png" alt="天氣家族" class="site-icon">
            <a href="index.html" class="site-title">天氣家族 Blog</a>
        </div>
        
        <div class="disclaimer">
            非官方社群網誌。所有內部文件及特殊天氣公告純屬交流用途。
        </div>

        <h1>最新隨筆動態</h1>
        
        <!-- Live posts container from /blogs/ folder -->
        <div id="blog-feed">正在載入天氣日誌...</div>

        <div class="footer">
            網誌更新於 2026年 | 天氣家族內部公告欄
        </div>
    </div>

    <script>
        const blogsFolder = 'blogs/';
        const indexFile = 'blogs/posts.txt';
        const feedContainer = document.getElementById('blog-feed');

        // Text parsing function: handles "## Title" and "[Text](URL)"
        function parseTextLog(rawText) {
            const lines = rawText.split('\n');
            let htmlOutput = '';
            let hasTitle = false;
            let titleText = '無題日誌';
            let bodyLines = [];

            lines.forEach(line => {
                let trimmed = line.trim();
                
                // 1. Detect "## Title"
                if (trimmed.startsWith('##')) {
                    titleText = trimmed.replace('##', '').trim();
                    hasTitle = true;
                } else if (trimmed.length > 0 || line === '') {
                    // 2. Detect Markdown style URLs: [Text](URL)
                    // Regular expression looks for text inside brackets followed by target link inside parentheses
                    let parsedLine = line.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
                    bodyLines.push(parsedLine);
                }
            });

            // Format output structure
            htmlOutput += `<div class="blog-post-card">`;
            htmlOutput += `<h2>${titleText}</h2>`;
            htmlOutput += `<p>${bodyLines.join('\n')}</p>`;
            htmlOutput += `</div>`;

            return htmlOutput;
        }

        // Fetch index file and read list of text blogs
        async function loadBlogFeed() {
            try {
                const response = await fetch(indexFile);
                if (!response.ok) throw new Error('無法讀取 posts.txt 索引檔');
                
                const textData = await response.text();
                const fileNames = textData.split('\n').map(name => name.trim()).filter(name => name.length > 0);
                
                if (fileNames.length === 0) {
                    feedContainer.innerHTML = '<p style="color:#666;">目前沒有任何發布文章。</p>';
                    return;
                }

                feedContainer.innerHTML = ''; // Clean placeholder

                // Read each file found in index list
                for (const file of fileNames) {
                    try {
                        const fileResponse = await fetch(blogsFolder + file);
                        if (fileResponse.ok) {
                            const fileContent = await fileResponse.text();
                            feedContainer.innerHTML += parseTextLog(fileContent);
                        }
                    } catch (err) {
                        console.error('讀取文章出錯: ' + file, err);
                    }
                }
            } catch (error) {
                feedContainer.innerHTML = `<div class="error-msg">載入失敗：請確保在本地運行了伺服器 (如 Live Server) 並且 /blogs/posts.txt 路徑正確。</div>`;
            }
        }

        // Initialize script
        loadBlogFeed();
    </script>
</body>
</html>
