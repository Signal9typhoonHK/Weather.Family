<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>天氣家族 (全自動網誌)</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        #container { max-width: 800px; margin: auto; background: #fff; padding: 40px; border: 1px solid #ddd; }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .site-icon { width: 50px; height: 50px; }
        .blog-card { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ccc; }
        .blog-card h4 { margin: 0 0 10px 0; color: #000; text-decoration: underline; }
        .blog-card p { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="container">
        <div class="brand">
            <img src="icons/weatherfamily.png" class="site-icon">
            <h1>天氣家族 Blog</h1>
        </div>
        <div id="blog-feed">正在自動同步網誌文章...</div>
    </div>

    <script>
        // 設定你的 GitHub 資訊
        const repoOwner = "你的GitHub帳號"; 
        const repoName = "你的倉庫名稱";
        const path = "blogs";

        async function autoLoadFiles() {
            const feed = document.getElementById('blog-feed');
            try {
                const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${path}`;
                const res = await fetch(url);
                const data = await res.json();
                
                feed.innerHTML = '';
                // 自動篩選所有 .txt 檔並顯示
                for (const file of data.filter(f => f.name.endsWith('.txt'))) {
                    const contentRes = await fetch(file.download_url);
                    const content = await contentRes.text();
                    // 自動抓取括號內容作為標題
                    const title = file.name.match(/\(([^)]+)\)/)?.[1] || file.name.replace('.txt', '');
                    const body = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
                    
                    feed.innerHTML += `<div class="blog-card"><h4>${title}</h4><p>${body}</p></div>`;
                }
            } catch(e) { feed.innerHTML = '無法自動同步，請確認 GitHub 倉庫設定是否正確。'; }
        }
        autoLoadFiles();
    </script>
</body>
</html>
